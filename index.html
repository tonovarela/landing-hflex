<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Asistencia | Semana Flexible</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind.config.js"></script>
    <!-- Anti-parpadeo: aplica el tema guardado ANTES de pintar -->
    <script src="js/theme-init.js"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-slate-100 dark:bg-slate-900 min-h-screen text-slate-700 dark:text-slate-300 antialiased transition-colors">

    <!-- ===== Encabezado: barra oscura a todo el ancho (logo + selector de tema) ===== -->
    <header class="relative z-50 w-full bg-white/90 dark:bg-slate-900/90 backdrop-blur-sm shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3 flex items-center justify-between gap-4">
            <!-- Logo modo claro -->
            <img src="https://servicios.litoprocess.com/static/assets/img/lito-light.png"
                 alt="Litoprocess" class="max-h-9 w-auto object-contain block dark:hidden">
            <!-- Logo modo oscuro -->
            <img src="https://servicios.litoprocess.com/static/assets/img/lito-dark.png"
                 alt="Litoprocess" class="max-h-9 w-auto object-contain hidden dark:block">

            <!-- Selector de tema (dropdown). Las opciones las genera JS según el
                 departamento: matrix y synthwave solo para Sistemas (ver renderThemeMenu). -->
            <div id="theme-menu" class="relative">
                <button id="theme-toggle" type="button" aria-haspopup="true" aria-expanded="false" aria-label="Cambiar tema"
                        class="inline-flex items-center gap-2 px-3 py-2 rounded-xl border border-slate-300 bg-slate-100 text-slate-700 hover:bg-slate-200 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-200 dark:hover:bg-slate-700 shadow-sm transition-colors">
                    <!-- Iconos por tema: JS muestra el del tema activo (ver syncThemeUI en app.js) -->
                    <!-- Sol (tema claro) -->
                    <svg id="icon-sun" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="4" stroke-width="1.8"/>
                        <path stroke-linecap="round" stroke-width="1.8" d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32l1.41 1.41M2 12h2m16 0h2M4.93 19.07l1.41-1.41m11.32-11.32l1.41-1.41"/>
                    </svg>
                    <!-- Luna (tema oscuro) -->
                    <svg id="icon-moon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
                    </svg>
                    <!-- Terminal (tema matrix · solo Sistemas) -->
                    <svg id="icon-matrix" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <rect x="3" y="4" width="18" height="16" rx="2" stroke-width="1.8"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M7 9l3 3-3 3M13.5 15H17"/>
                    </svg>
                    <!-- Sol retro (tema synthwave · solo Sistemas) -->
                    <svg id="icon-synthwave" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M6 13a6 6 0 0112 0"/>
                        <path stroke-linecap="round" stroke-width="1.8" d="M8.5 10.5h7M7.5 13h9"/>
                        <path stroke-linecap="round" stroke-width="1.8" d="M3 17h4m3 0h4m3 0h4"/>
                    </svg>
                    <!-- Estrella (tema galaxy · solo Sistemas) -->
                    <svg id="icon-galaxy" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.6" d="M12 4c.6 3.4 1.6 4.4 5 5-3.4.6-4.4 1.6-5 5-.6-3.4-1.6-4.4-5-5 3.4-.6 4.4-1.6 5-5z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.6" d="M18.5 14.5c.25 1.4.65 1.8 2 2-1.35.2-1.75.6-2 2-.25-1.4-.65-1.8-2-2 1.35-.2 1.75-.6 2-2z"/>
                    </svg>
                    <span id="theme-label" class="text-sm font-medium">Tema</span>
                    <!-- Chevron -->
                    <svg id="theme-chevron" class="w-4 h-4 text-slate-400 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M6 9l6 6 6-6"/>
                    </svg>
                </button>

                <!-- Panel de opciones (lo rellena renderThemeMenu en app.js) -->
                <div id="theme-dropdown" role="menu" aria-labelledby="theme-toggle"
                     class="hidden absolute right-0 mt-2 w-44 origin-top-right rounded-xl border border-slate-200 bg-white shadow-lg dark:border-slate-700 dark:bg-slate-800 py-1 z-40"></div>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">

        <!-- ===== Contenido principal (dashboard) ===== -->
        <div id="dashboard" class="space-y-6">

            <!-- Fila superior: perfil + resumen semanal -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

                <!-- Tarjeta de perfil -->
                <section class="lg:col-span-1 bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 p-6 flex flex-col items-center transition-colors">
                    <div class="relative">
                        <div class="w-28 h-28 rounded-full p-1 ring-2 ring-slate-200 dark:ring-slate-600">
                            <img id="profile-avatar" src="" alt="Foto de perfil"
                                 class="w-full h-full rounded-full object-cover bg-slate-200 dark:bg-slate-600">
                        </div>
                        <span id="profile-status"
                              class="absolute bottom-2 right-2 w-4 h-4 rounded-full bg-brand-green border-2 border-white dark:border-slate-800"></span>
                    </div>

                    <h1 id="profile-name" class="mt-4 text-lg font-bold text-slate-800 dark:text-slate-100 text-center uppercase tracking-wide">
                        <span class="skeleton inline-block h-5 w-48 rounded"></span>
                    </h1>
                    <p id="profile-role" class="mt-1 text-xs font-medium text-slate-400 dark:text-slate-500 uppercase tracking-wider">
                        <span class="skeleton inline-block h-3 w-32 rounded"></span>
                    </p>
                </section>

                <!-- Tarjeta de resumen semanal -->
                <section class="lg:col-span-2 relative bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 p-5 sm:p-6 transition-colors">
                    <!-- Lienzo para los fuegos artificiales (limitado a esta tarjeta) -->
                    <canvas id="fireworks-canvas" class="hidden"></canvas>
                    <div class="flex items-end justify-between gap-3 mb-4">
                        <!-- min-w-0: deja que el título/selector se encojan antes de empujar al porcentaje -->
                        <div class="min-w-0">
                            <div class="flex items-center gap-2">
                                <h2 id="week-title" class="text-sm sm:text-base font-medium text-slate-700 dark:text-slate-200 truncate">Semana Flexible</h2>
                                <!-- Selector de semana: visible solo cuando el servicio devuelve más de una semana -->
                                <select id="week-selector"
                                        aria-label="Seleccionar semana"
                                        class="hidden max-w-full text-sm sm:text-base font-medium text-slate-700 dark:text-slate-200 bg-transparent border border-slate-200 dark:border-slate-600 rounded-lg pl-2 pr-8 py-1 focus:outline-none focus:ring-2 focus:ring-brand-green cursor-pointer"></select>
                            </div>
                            <p id="progress-label" class="mt-1 text-xs text-slate-400 dark:text-slate-500">— de — horas</p>
                        </div>
                        <!-- El color lo asigna renderWeek según el porcentaje alcanzado -->
                        <span id="progress-pct" class="shrink-0 text-2xl sm:text-3xl font-semibold text-slate-800 dark:text-slate-100 tabular-nums leading-none">0.0%</span>
                    </div>

                    <div class="h-1.5 rounded-full bg-slate-100 dark:bg-slate-700 overflow-hidden">
                        <div id="progress-bar"
                             class="h-full rounded-full bg-brand-green transition-all duration-700 ease-out"
                             style="width: 0%"></div>
                    </div>

                    <!-- 7 tarjetas (ver renderWeek). En sm+: 3 de horas + 3 de incidencias en
                         las tres primeras columnas y "Diferencia" ocupando la cuarta columna
                         completa (las dos filas). En móvil: 2 columnas y "Diferencia" al final,
                         a todo el ancho y separada por una línea. -->
                    <div id="stats-grid" class="mt-5 grid grid-cols-2 sm:grid-cols-4 gap-y-4 gap-x-4"></div>
                </section>
            </div>

            <!-- Tabla de registros -->
            <section class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 p-4 sm:p-6 transition-colors">
                <h2 class="text-center text-lg font-bold text-slate-800 dark:text-slate-100 mb-4">Registros de Asistencia de la Semana</h2>

                <!-- Vista tabla (>= sm) -->
                <div class="hidden sm:block overflow-x-auto">
                    <table class="w-full">
                        <thead>
                            <tr class="text-[11px] font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-wider border-b border-slate-100 dark:border-slate-700">
                                <th class="text-left  py-3 px-3">Día</th>
                                <th class="text-center py-3 px-3">Entrada</th>
                                <th class="text-center py-3 px-3">Salida</th>
                                <th class="text-right  py-3 px-3">Total</th>
                                <th class="py-3 px-3 w-12"><span class="sr-only">Home office</span></th>
                            </tr>
                        </thead>
                        <tbody id="records-body" class="divide-y divide-slate-50 dark:divide-slate-700/60 text-sm"></tbody>
                    </table>
                </div>

                <!-- Vista tarjetas (< sm) -->
                <div id="records-cards" class="sm:hidden space-y-3"></div>
            </section>
        </div>

        <!-- ===== Estado: colaborador no encontrado / id faltante ===== -->
        <section id="not-found" class="hidden">
          <div class="min-h-[70vh] flex items-center justify-center">
            <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 p-10 max-w-md w-full text-center">
                <div class="mx-auto w-16 h-16 rounded-full bg-amber-50 dark:bg-amber-500/10 flex items-center justify-center">
                    <svg class="w-8 h-8 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                              d="M12 9v3.75m0 3.75h.008M10.34 3.94l-8.02 13.9A1.5 1.5 0 003.62 20.1h16.76a1.5 1.5 0 001.3-2.26l-8.02-13.9a1.5 1.5 0 00-2.6 0z"/>
                    </svg>
                </div>
                <h2 id="not-found-title" class="mt-5 text-xl font-bold text-slate-800 dark:text-slate-100">Colaborador no encontrado</h2>
                <p id="not-found-msg" class="mt-2 text-sm text-slate-500 dark:text-slate-400">
                    No existe un colaborador con el identificador proporcionado.
                </p>
                <p class="mt-4 text-xs text-slate-400 dark:text-slate-500">
                    Verifica el parámetro <code class="bg-slate-100 dark:bg-slate-700 px-1.5 py-0.5 rounded font-mono text-slate-600 dark:text-slate-300">?id=</code> en la URL.
                </p>
            </div>
          </div>
        </section>

        <!-- ===== Estado: error de conexión ===== -->
        <div id="error-banner" class="hidden bg-red-50 dark:bg-red-500/10 border border-red-200 dark:border-red-500/30 text-red-700 dark:text-red-400 rounded-xl p-4 text-sm text-center mt-6">
            No se pudieron cargar los datos. <button id="retry-button" type="button" class="underline font-semibold">Reintentar</button>
        </div>

    </div>

    <!-- Módulos ES: solo se carga el punto de entrada; el resto se resuelve por
         sus imports (cada archivo tiene su propio ámbito, sin variables globales).
         Al ser módulos requieren servirse por HTTP (no funcionan con file://). -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
